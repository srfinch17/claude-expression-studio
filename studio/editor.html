<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Editor · Expression Studio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root { --bg:#08080b; --bg-2:#0c0c10; --panel:#0e0e13; --panel-sub:#060608; --sub:#15151b;
      --text:#ecedf2; --dim:#9a9ba6; --faint:#5d5e6a; --hair:#1c1c24;
      --emotion:#ff5008; --info:#22ddff; --orange:#ff5008; --cyan:#22ddff; --green:#16a34a;
      --mono:'IBM Plex Mono', ui-monospace, 'SF Mono', Menlo, monospace;
      --sans:'IBM Plex Sans', system-ui, -apple-system, sans-serif; }
    * { box-sizing: border-box; }
    body { margin:0; color:var(--text); font:14px var(--mono); padding:0 0 60px;
      -webkit-font-smoothing:antialiased;
      background:
        radial-gradient(1100px 620px at 88% -16%, rgba(255,80,8,.07), transparent 60%),
        var(--bg); }
    header { position:sticky; top:0; z-index:5; background:rgba(8,8,11,.82);
      backdrop-filter:blur(10px); -webkit-backdrop-filter:blur(10px);
      border-bottom:1px solid var(--hair);
      display:flex; align-items:center; gap:12px; padding:13px 18px; }
    header h1 { font-size:.82rem; font-weight:700; letter-spacing:.02em; margin:0; flex:0 0 auto; }
    header h1::before { content:"◆ "; color:var(--emotion); }
    #banner { color:var(--orange); font-size:.78rem; flex:1; }
    button { font:inherit; font-size:.8rem; color:var(--text); background:rgba(255,255,255,.04);
      border:1px solid var(--hair); border-radius:8px; padding:5px 12px; cursor:pointer;
      transition:border-color .14s, color .14s; }
    button:hover { border-color:#2f2f3a; }
    button:disabled { opacity:.4; cursor:not-allowed; }
    button.save { border-color:color-mix(in srgb, var(--green) 55%, #2a2a32); color:#9affc8; }
    #status { font-size:.76rem; color:var(--dim); min-width:14ch; }
    main { display:grid; grid-template-columns:minmax(0,1fr) minmax(360px,46%); gap:16px; padding:16px; align-items:start; }
    .intent { background:linear-gradient(180deg, rgba(255,255,255,.018), transparent); border:1px solid var(--hair); border-radius:12px; padding:10px; margin-bottom:10px; }
    .intent.drop { border-color:var(--cyan); box-shadow:0 0 0 1px var(--cyan); }
    .intent h2 { font-size:.82rem; margin:0 0 2px; }
    .intent .meta { font-size:.66rem; color:var(--faint); margin-bottom:7px; line-height:1.35; }
    .pool { display:flex; flex-wrap:wrap; gap:8px; align-items:flex-start; }
    .tile { width:84px; background:rgba(255,255,255,.03); border:1px solid var(--hair); border-radius:9px; padding:6px; position:relative; }
    .tile canvas { width:72px; height:72px; border-radius:5px; background:var(--panel-sub); display:block; }
    .tile .nm { font-size:.62rem; margin-top:4px; word-break:break-all; color:var(--text); line-height:1.1; }
    .tile .pct { font-size:.6rem; color:var(--cyan); }
    .tile .editlink { display:inline-block; font-size:.58rem; color:var(--cyan); text-decoration:none; margin-top:2px; }
    .tile .editlink:hover { text-decoration:underline; }
    .tile input[type=range] { width:72px; margin:2px 0 0; }
    .tile .x { position:absolute; top:3px; right:3px; width:15px; height:15px; line-height:13px;
      text-align:center; border-radius:50%; background:#000a; border:1px solid #333; cursor:pointer; font-size:.66rem; }
    .empty { font-size:.68rem; color:var(--faint); padding:12px; border:1px dashed #2a2a34; border-radius:8px; }
    /* Controls footer: a hairline rule sets the controls apart from the animation tiles above,
       and thin vertical separators keep noRepeat / brightness / test reading as distinct groups. */
    .controls { margin-top:12px; padding-top:11px; border-top:1px solid var(--hair);
      display:flex; align-items:center; gap:14px; flex-wrap:wrap; font-size:.68rem; color:var(--dim); }
    .controls > * + * { border-left:1px solid var(--hair); padding-left:14px; }
    .controls label { display:inline-flex; align-items:center; gap:6px; }
    .controls input[type=number] { width:60px; padding:4px 6px; font:inherit; background:#000;
      color:var(--text); border:1px solid var(--hair); border-radius:5px; }
    .ctl-test { display:inline-flex; align-items:center; gap:8px; }
    .ctl-test canvas { width:46px; height:46px; border-radius:5px; background:var(--panel-sub); }
    aside { position:sticky; top:64px; background:linear-gradient(180deg, rgba(255,255,255,.018), transparent); border:1px solid var(--hair); border-radius:12px; padding:12px; }
    aside h2 { font-size:.72rem; letter-spacing:.2em; text-transform:uppercase; color:var(--dim); margin:0 0 4px; }
    .legend { font-size:.64rem; color:var(--dim); margin-bottom:10px; display:flex; gap:14px; }
    .legend .sw { display:inline-block; width:9px; height:9px; border-radius:2px; border:2px solid; margin-right:4px; vertical-align:middle; }
    .legend .av { border-color:var(--green); }
    .legend .as { border-color:var(--orange); }
    .tray { display:flex; flex-wrap:wrap; gap:8px; max-height:82vh; overflow-y:auto; align-content:flex-start; }
    .ptile { width:62px; background:var(--sub); border:2px solid var(--green); border-radius:8px; padding:4px; cursor:grab; text-align:center; }
    .ptile.assigned { border-color:var(--orange); }
    .ptile canvas { width:46px; height:46px; border-radius:5px; background:var(--panel-sub); display:block; margin:0 auto; }
    .ptile .nm { font-size:.56rem; margin-top:3px; word-break:break-all; color:var(--dim); line-height:1.05; }
    .ptile .cnt { font-size:.56rem; color:var(--orange); }
    .tile .gear { width:100%; margin-top:4px; padding:2px; font-size:.58rem; }
    .entryed { position:absolute; top:4px; left:90px; z-index:20; width:212px; background:#0d0d12;
      border:1px solid #2a2a34; border-radius:8px; padding:8px; display:flex; flex-direction:column; gap:6px;
      box-shadow:0 6px 22px #000a; }
    .entryed.hidden { display:none; }
    .prow { display:flex; align-items:center; gap:6px; font-size:.62rem; color:var(--dim); }
    .prow input[type=text] { flex:1; font:inherit; font-size:.6rem; background:#000; color:var(--text); border:1px solid #2a2a34; border-radius:4px; }
    .prow input[type=range] { flex:1; }
    .prow select { font:inherit; font-size:.6rem; background:#000; color:var(--text); border:1px solid #2a2a34; border-radius:4px; }
    .prow button { padding:1px 6px; font-size:.62rem; }
    .entryed details summary { font-size:.6rem; color:var(--faint); cursor:pointer; }
    .rawjson { width:100%; height:48px; margin-top:4px; resize:vertical; font:inherit; font-size:.58rem;
      background:#000; color:var(--text); border:1px solid #2a2a34; border-radius:4px; }
    .jsonerr { color:var(--orange); font-size:.58rem; min-height:.7em; }
  </style>
</head>
<body>
  <script type="module" src="./studio-nav.js"></script>
  <header>
    <h1>Studio Editor</h1>
    <span id="banner"></span>
    <span id="status"></span>
    <button id="revert">Revert</button>
    <button id="save" class="save">Save</button>
  </header>
  <main>
    <div id="intents"></div>
    <aside>
      <h2>Animations</h2>
      <div class="legend"><span><span class="sw av"></span>available</span><span><span class="sw as"></span>assigned (N&nbsp;events)</span></div>
      <div id="tray" class="tray"></div>
    </aside>
  </main>

  <script type="module">
    import { Panel } from "../shared/render.js";
    import { FIRMWARE_SIMS } from "../shared/firmware-sims.js";
    import { resolveExpression } from "../shared/expressions.js";
    import { pickWeighted } from "../shared/resolver.js";
    import { buildPlaylists } from "./board.js";
    import { ownBindings, isPool, bindingEntries, poolPercentages, assignmentCounts,
             assign, remove, reweight, move, singleToPool, poolToSingle, setPoolOption,
             setEntryParam, removeEntryParam, setEntryParamsRaw, setLabel } from "./editor.js";
    import { INTENT_FIRES } from "./intent-info.js";
    import { FIRMWARE_PARAMS } from "./firmware-params.js";

    const RID = "esp32-8x8";
    const FW_DEFAULTS = { frostbite:{mist:40,sparkle:20}, fire:{palette:"classic",intensity:6},
      matrix_rain:{theme:"classic",frame_ms:60}, snow:{frame_ms:110,flakeColor:"#dce6ff"}, dancefloor:{palette:0,hold:6} };
    const REDUCE = matchMedia("(prefers-reduced-motion:reduce)").matches;

    const intentsEl = document.getElementById("intents");
    const trayEl = document.getElementById("tray");
    const statusEl = document.getElementById("status");
    const bannerEl = document.getElementById("banner");
    const saveBtn = document.getElementById("save");
    const revertBtn = document.getElementById("revert");

    let manifest = null, readOnly = false, byName = new Map(), allItems = [], dirty = false;
    const animating = new Set();   // ONLY hovered Panels animate; everything else holds a still frame

    // Drive an existing Panel to play a library item (firmware sim OR frame-expression).
    function drive(panel, name) {
      const it = byName.get(name);
      if (it && it.kind === "firmware") { const sim = FIRMWARE_SIMS[name](FW_DEFAULTS[name] || {}); panel.setStepper(() => sim.frame(), sim.frame_ms); }
      else if (it) { const ex = resolveExpression(it.entry); panel.setFrames(ex.frames, ex.frame_ms); }
      else { panel.setFrames([[]], 1e9); } // unknown name -> blank
    }
    function makePanel(cv, name) {
      const p = new Panel(cv); drive(p, name);
      // Firmware sims are continuous (no discrete frames) — run a few steps so the frozen tile
      // shows a developed state, not the blank first frame.
      const it = byName.get(name);
      if (it && it.kind === "firmware") for (let i = 0; i < 10; i++) p.tick(p.frameMs, performance.now());
      freezeMid(p);
      return p;
    }
    // Park a panel on a representative STILL: a frame-expression holds a MIDDLE frame; a continuous
    // firmware sim holds wherever it stopped. Called at build time and whenever the mouse leaves.
    function freezeMid(p) {
      if (p.frames && p.frames.length > 1) { p.fi = Math.floor(p.frames.length / 2); p.acc = 0; }
      p._dirty = true; p.draw(performance.now());
    }
    // Animate ONLY while hovered — playing every tile at once was the page's CPU sink + sensory
    // overload. Enter -> play; leave -> re-park on the middle frame.
    function wireHover(el, p) {
      el.addEventListener("mouseenter", () => animating.add(p));
      el.addEventListener("mouseleave", () => { animating.delete(p); freezeMid(p); });
    }

    function setDirty(d) { dirty = d; statusEl.textContent = readOnly ? "read-only (no engine)" : d ? "unsaved changes" : "saved"; saveBtn.disabled = readOnly || !d; }

    // Only the hovered tile(s) tick; the page stays near-idle otherwise.
    if (!REDUCE) { let last = performance.now(); (function loop(now){ const dt = now - last; last = now; for (const p of animating) p.tick(dt, now); requestAnimationFrame(loop); })(performance.now()); }

    function apply(fn) { manifest = fn(manifest); setDirty(true); render(); }
    // For param/label edits that don't change tile layout (% / counts / membership): update the
    // manifest + mark dirty WITHOUT re-rendering, so the open ⚙ expander keeps its DOM state.
    function applyQuiet(fn) { manifest = fn(manifest); setDirty(true); }

    // One typed control for a schema param. cur = the entry's current value (undefined = unset →
    // ghost the schema default). All edits go through applyQuiet so the open expander survives.
    function widgetFor(intent, name, key, spec, cur) {
      const row = document.createElement("label"); row.className = "prow";
      const val = cur != null ? cur : spec.default;
      const set = (v) => applyQuiet((m) => setEntryParam(m, RID, intent, name, key, v));
      const clear = () => applyQuiet((m) => removeEntryParam(m, RID, intent, name, key));
      let ctrl;
      if (spec.type === "number") {
        ctrl = document.createElement("input"); ctrl.type = "range";
        ctrl.min = spec.min; ctrl.max = spec.max; ctrl.step = spec.step || 1; ctrl.value = val;
        const out = document.createElement("span"); out.textContent = val;
        ctrl.addEventListener("input", () => (out.textContent = ctrl.value));
        ctrl.addEventListener("change", () => set(Number(ctrl.value)));
        row.append(`${key} `, ctrl, out);
      } else if (spec.type === "enum") {
        ctrl = document.createElement("select");
        for (const o of spec.options) { const op = document.createElement("option"); op.value = o; op.textContent = o; if (o === val) op.selected = true; ctrl.appendChild(op); }
        ctrl.addEventListener("change", () => set(ctrl.value));
        row.append(`${key} `, ctrl);
      } else if (spec.type === "color") {
        ctrl = document.createElement("input"); ctrl.type = "color";
        ctrl.value = (typeof val === "string" && val[0] === "#") ? val : "#000000";
        ctrl.addEventListener("change", () => set(ctrl.value));
        row.append(`${key} `, ctrl);
      } else if (spec.type === "bool") {
        ctrl = document.createElement("input"); ctrl.type = "checkbox"; ctrl.checked = !!val;
        ctrl.addEventListener("change", () => set(ctrl.checked));
        row.append(ctrl, ` ${key}`);
      }
      if (cur != null) { const c = document.createElement("button"); c.type = "button"; c.textContent = "↺"; c.title = "reset to default"; c.onclick = clear; row.appendChild(c); }
      return row;
    }

    // The ⚙ expander for one pool entry: a label field (always) + typed param widgets and a raw-JSON
    // escape hatch (firmware entries only). Built hidden; the gear toggles .hidden.
    function buildEntryEditor(intent, name) {
      const wrap = document.createElement("div"); wrap.className = "entryed hidden";
      const entry = (ownBindings(manifest, RID)[intent].pool || {})[name];
      const params = (entry && typeof entry === "object" && entry.params) || {};
      const label = (entry && typeof entry === "object" && entry.label) || "";
      const it = byName.get(name);
      const isFw = it && it.kind === "firmware";
      const schema = isFw ? FIRMWARE_PARAMS[name] : null;

      const lab = document.createElement("label"); lab.className = "prow";
      const li = document.createElement("input"); li.type = "text"; li.value = label; li.placeholder = "label";
      li.addEventListener("change", () => applyQuiet((m) => setLabel(m, RID, intent, name, li.value)));
      lab.append("label ", li); wrap.appendChild(lab);

      if (schema) for (const [key, spec] of Object.entries(schema)) wrap.appendChild(widgetFor(intent, name, key, spec, params[key]));

      if (isFw) {
        const det = document.createElement("details"); const sum = document.createElement("summary"); sum.textContent = "advanced (raw JSON)";
        const ta = document.createElement("textarea"); ta.className = "rawjson"; ta.placeholder = '{"key": value}';
        ta.value = Object.keys(params).length ? JSON.stringify(params) : "";
        const err = document.createElement("div"); err.className = "jsonerr";
        // Re-seed from the live manifest each time the box is opened (widget edits may have changed params).
        det.addEventListener("toggle", () => {
          if (!det.open) return;
          const e2 = (ownBindings(manifest, RID)[intent].pool || {})[name];
          const p2 = (e2 && typeof e2 === "object" && e2.params) || {};
          ta.value = Object.keys(p2).length ? JSON.stringify(p2) : ""; err.textContent = "";
        });
        ta.addEventListener("change", () => {
          const t = ta.value.trim();
          if (!t) { err.textContent = ""; applyQuiet((m) => setEntryParamsRaw(m, RID, intent, name, {})); return; }
          let o; try { o = JSON.parse(t); } catch { err.textContent = "invalid JSON"; return; }
          if (o == null || typeof o !== "object" || Array.isArray(o)) { err.textContent = "must be a JSON object"; return; }
          err.textContent = ""; applyQuiet((m) => setEntryParamsRaw(m, RID, intent, name, o));
        });
        det.append(sum, ta, err); wrap.appendChild(det);
      }
      return wrap;
    }

    function render() {
      animating.clear();   // re-render replaces every tile; drop stale hover state
      intentsEl.innerHTML = "";
      const bindings = ownBindings(manifest, RID);
      for (const intent of Object.keys(manifest.intents || {})) {
        const binding = bindings[intent];
        const sec = document.createElement("div");
        sec.className = "intent";
        const def = manifest.intents[intent] || {};
        const desc = INTENT_FIRES[intent] || def.doc || "";
        sec.innerHTML = `<h2>${intent}</h2><div class="meta">${desc}</div>`;

        if (binding == null) {
          const e = document.createElement("div"); e.className = "empty"; e.textContent = "drop an animation here to bind"; sec.appendChild(e);
        } else {
          const pool = document.createElement("div"); pool.className = "pool";
          const pcts = poolPercentages(binding);
          const poolMode = isPool(binding);
          for (const { name, weight } of bindingEntries(binding)) {
            const tile = document.createElement("div"); tile.className = "tile"; tile.draggable = true;
            tile.addEventListener("dragstart", (ev) => ev.dataTransfer.setData("text/plain", JSON.stringify({ name, from: intent })));
            const cv = document.createElement("canvas"); cv.width = 72; cv.height = 72; tile.appendChild(cv);
            wireHover(tile, makePanel(cv, name));
            const nm = document.createElement("div"); nm.className = "nm"; nm.textContent = name; tile.appendChild(nm);
            if (byName.get(name)?.entry?.source === "saved") { const ed = document.createElement("a"); ed.className = "editlink";
              ed.href = `./frame-editor.html?name=${encodeURIComponent(name)}`; ed.textContent = "✎"; ed.title = "Edit pixels";
              ed.onclick = (ev) => ev.stopPropagation(); tile.appendChild(ed); }
            if (!readOnly) { const x = document.createElement("div"); x.className = "x"; x.textContent = "×";
              x.onclick = () => apply((m) => remove(m, RID, intent, name)); tile.appendChild(x); }
            if (poolMode) {
              const pct = document.createElement("div"); pct.className = "pct"; pct.textContent = `${pcts[name]}% · w${weight}`; tile.appendChild(pct);
              if (!readOnly) { const sl = document.createElement("input"); sl.type = "range"; sl.min = 0; sl.max = 100; sl.value = weight;
                sl.addEventListener("change", () => apply((m) => reweight(m, RID, intent, name, Number(sl.value)))); tile.appendChild(sl); }
              if (!readOnly) {
                const ed = buildEntryEditor(intent, name);
                const gear = document.createElement("button"); gear.type = "button"; gear.className = "gear"; gear.textContent = "⚙ params"; gear.title = "params / label";
                gear.onclick = () => ed.classList.toggle("hidden");
                tile.appendChild(gear); tile.appendChild(ed);
              }
            }
            pool.appendChild(tile);
          }
          sec.appendChild(pool);
          // (pool options + test live in the .controls footer below, divided from the tiles)
        }

        // --- controls footer: a hairline divider (see .controls) sets these apart from the tiles ---
        const controls = document.createElement("div"); controls.className = "controls";

        // pool options (only when editable and a binding exists)
        if (binding != null && !readOnly) {
          if (isPool(binding)) {
            const nr = document.createElement("label"); nr.innerHTML = `<input type="checkbox" ${binding.noRepeat?"checked":""}> noRepeat`;
            nr.querySelector("input").onchange = (e) => apply((m) => setPoolOption(m, RID, intent, "noRepeat", e.target.checked)); controls.appendChild(nr);
            const br = document.createElement("label"); br.innerHTML = `brightness <input type="number" min="0" max="255" value="${binding.brightness ?? ""}">`;
            br.querySelector("input").onchange = (e) => apply((m) => setPoolOption(m, RID, intent, "brightness", e.target.value === "" ? null : Number(e.target.value))); controls.appendChild(br);
            if (bindingEntries(binding).length === 1) { const c = document.createElement("button"); c.textContent = "→ single"; c.onclick = () => apply((m) => poolToSingle(m, RID, intent)); controls.appendChild(c); }
          } else { const c = document.createElement("button"); c.textContent = "→ pool"; c.onclick = () => apply((m) => singleToPool(m, RID, intent)); controls.appendChild(c); }
        }

        // test-fire: one preview Panel per intent; ▶ re-drives it with a fresh weighted pick.
        const ctlTest = document.createElement("div"); ctlTest.className = "ctl-test";
        const btn = document.createElement("button"); btn.textContent = "▶ test";
        const pv = document.createElement("canvas"); pv.width = 46; pv.height = 46;
        const pvPanel = new Panel(pv); freezeMid(pvPanel); wireHover(pv, pvPanel);
        btn.onclick = () => {
          const b = ownBindings(manifest, RID)[intent];
          const pick = isPool(b) ? pickWeighted(b.pool) : (typeof b === "string" ? b : null);
          if (!pick) return;
          drive(pvPanel, pick);
          animating.add(pvPanel);                      // play the fresh pick briefly, then re-park
          clearTimeout(pvPanel._t);
          pvPanel._t = setTimeout(() => { animating.delete(pvPanel); freezeMid(pvPanel); }, 4000);
        };
        ctlTest.append(btn, pv);
        controls.appendChild(ctlTest);
        sec.appendChild(controls);

        // drop target: assign (from tray) or move (from another intent)
        sec.addEventListener("dragover", (ev) => { if (!readOnly) { ev.preventDefault(); sec.classList.add("drop"); } });
        sec.addEventListener("dragleave", () => sec.classList.remove("drop"));
        sec.addEventListener("drop", (ev) => {
          sec.classList.remove("drop"); if (readOnly) return; ev.preventDefault();
          let d; try { d = JSON.parse(ev.dataTransfer.getData("text/plain")); } catch { return; }
          if (d.from == null) apply((m) => assign(m, RID, intent, d.name));
          else if (d.from !== intent) apply((m) => move(m, RID, d.from, intent, d.name));
        });
        intentsEl.appendChild(sec);
      }
      renderTray();
    }

    // The palette: every animation as a mini live-preview tile, color-coded by assignment.
    // Sort: available (green, 0 events) first alphabetically, then assigned (orange) below.
    function renderTray() {
      trayEl.innerHTML = "";
      const counts = assignmentCounts(manifest, RID, allItems.map((i) => i.name));
      const ordered = [...allItems].sort((a, b) => {
        const aAssigned = (counts[a.name] || 0) > 0 ? 1 : 0;
        const bAssigned = (counts[b.name] || 0) > 0 ? 1 : 0;
        if (aAssigned !== bAssigned) return aAssigned - bAssigned;   // available before assigned
        return a.name.localeCompare(b.name);                        // then alphabetical
      });
      for (const it of ordered) {
        const n = counts[it.name] || 0;
        const t = document.createElement("div"); t.className = "ptile" + (n > 0 ? " assigned" : "");
        t.draggable = true;
        t.addEventListener("dragstart", (ev) => ev.dataTransfer.setData("text/plain", JSON.stringify({ name: it.name, from: null })));
        const cv = document.createElement("canvas"); cv.width = 46; cv.height = 46; t.appendChild(cv);
        wireHover(t, makePanel(cv, it.name));
        const nm = document.createElement("div"); nm.className = "nm"; nm.textContent = it.name; t.appendChild(nm);
        if (n > 0) { const c = document.createElement("div"); c.className = "cnt"; c.textContent = `(${n})`; t.appendChild(c); }
        trayEl.appendChild(t);
      }
    }

    async function loadManifest() {
      try {
        const r = await fetch("/api/manifest");
        if (r.ok) { manifest = await r.json(); readOnly = false; bannerEl.textContent = ""; return; }
        throw new Error("no engine");
      } catch {
        manifest = await (await fetch("../shared/manifest.json")).json();
        readOnly = true;
        bannerEl.textContent = "Editing needs the live engine. Launch the Studio via matrix_studio. (Exploring read-only; Save disabled.)";
      }
    }

    saveBtn.onclick = async () => {
      saveBtn.disabled = true; statusEl.textContent = "saving…";
      try {
        const r = await fetch("/api/manifest", { method: "PUT", headers: { "content-type": "application/json" }, body: JSON.stringify(manifest) });
        const res = await r.json();
        if (res.ok) { setDirty(false); statusEl.textContent = "saved · behavior is live"; }
        // setDirty(true) FIRST, then the message: setDirty also writes statusEl, so doing it last
        // would clobber the reason with "unsaved changes" (the bug that hid earlier save failures).
        else { setDirty(true); statusEl.textContent = "validation failed: " + (res.errors || []).join("; "); }
      } catch (e) { setDirty(true); statusEl.textContent = "save error: " + e.message; }
    };
    revertBtn.onclick = async () => { await loadManifest(); setDirty(false); render(); };

    // --- boot ---
    const data = await (await fetch("./gallery-data.json")).json();
    allItems = buildPlaylists(data, Object.keys(FIRMWARE_SIMS), []).all;
    byName = new Map(allItems.map((it) => [it.name, it]));
    await loadManifest();
    setDirty(false);
    render();
  </script>
</body>
</html>
